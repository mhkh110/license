<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XBody License Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #0d1117; border: 1px solid #6c5ce7; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; }
        h1 { color: #a855f7; text-align: center; margin-bottom: 30px; }
        label { color: #888; font-size: 12px; font-weight: bold; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; background: #1a1a2e; border: 2px solid #333; border-radius: 12px; color: #fff; font-size: 18px; font-family: 'Consolas', monospace; letter-spacing: 3px; margin-bottom: 16px; outline: none; }
        input:focus, select:focus { border-color: #a855f7; }
        button { width: 100%; padding: 16px; background: #a855f7; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #9333ea; }
        .result { margin-top: 20px; padding: 20px; background: #000; border: 2px dashed #00ffc8; border-radius: 12px; text-align: center; display: none; }
        .result.show { display: block; }
        .key { font-size: 24px; color: #fff; letter-spacing: 4px; font-family: 'Consolas', monospace; margin-bottom: 12px; }
        .copy-btn { background: #00ffc8; color: #000; font-size: 14px; padding: 10px; }
        .debug { margin-top: 16px; padding: 14px; background: #000; color: #0f0; font-family: 'Consolas', monospace; font-size: 11px; border-radius: 8px; display: none; }
        .debug.show { display: block; }
        .error { color: #ff4444; text-align: center; margin-bottom: 12px; display: none; }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔮 XBody License Generator</h1>
        
        <div class="error" id="error"></div>
        
        <label>SERIAL NUMBER</label>
        <input type="text" id="serial" placeholder="XXXX-XXXX-XXXX" maxlength="14" oninput="this.value = this.value.toUpperCase().replace(/[^A-F0-9]/g,'').replace(/(.{4})(.{4})(.{4})/,'$1-$2-$3')">
        
        <label>VERSION</label>
        <select id="version">
            <option value="1">Version 1</option>
            <option value="2">Version 2</option>
            <option value="3">Version 3</option>
        </select>
        
        <button onclick="generate()">⚡ Generate</button>
        
        <div class="result" id="result">
            <p style="color:#00ffc8;font-size:11px;margin-bottom:8px;">ACTIVATION KEY</p>
            <div class="key" id="keyDisplay"></div>
            <button class="copy-btn" onclick="copyKey()">📋 Copy</button>
        </div>
        
        <div class="debug" id="debug"></div>
    </div>

    <script>
        const SECRET = "XBody2024SuperSecretKey123456";
        
        function generate() {
            const serialRaw = document.getElementById('serial').value.replace(/-/g, '').toUpperCase();
            const version = document.getElementById('version').value;
            
            document.getElementById('error').classList.remove('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('debug').classList.remove('show');
            
            if (serialRaw.length !== 12 || !/^[A-F0-9]{12}$/.test(serialRaw)) {
                document.getElementById('error').textContent = '❌ Invalid Serial';
                document.getElementById('error').classList.add('show');
                return;
            }
            
            // استفاده از Latin1 مثل C++
            const inputData = serialRaw + SECRET + version;
            const hash = CryptoJS.SHA256(inputData).toString().toUpperCase();
            const core = hash.substring(0, 12);
            const key = core.substring(0,4) + '-' + core.substring(4,8) + '-' + core.substring(8,12) + '-' + version.padStart(2,'0');
            
            document.getElementById('keyDisplay').textContent = key;
            document.getElementById('result').classList.add('show');
            
            document.getElementById('debug').innerHTML = 
                'Serial: ' + serialRaw + '\n' +
                'Secret: ' + SECRET + '\n' +
                'Version: ' + version + '\n' +
                'Input: ' + inputData + '\n' +
                'SHA256: ' + hash + '\n' +
                'Core: ' + core + '\n' +
                'Key: ' + key;
            document.getElementById('debug').classList.add('show');
        }
        
        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('keyDisplay').textContent);
            alert('✅ Copied!');
        }
    </script>
</body>
</html>
