<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBody - License Generator</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            background: #1a2235;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }
        
        .title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            color: #60a5fa;
        }
        
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #94a3b8;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #0f1729;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 16px;
            font-family: 'Consolas', 'Vazirmatn', monospace;
            transition: all 0.3s;
        }
        
        select {
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Vazirmatn', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #0f1729;
            border: 2px dashed #10b981;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .license-key {
            font-size: 28px;
            font-weight: 800;
            font-family: 'Consolas', monospace;
            letter-spacing: 3px;
            direction: ltr;
            color: #e2e8f0;
            word-break: break-all;
        }
        
        .copy-btn {
            background: #3b82f6;
            margin-top: 12px;
            font-size: 14px;
            padding: 12px;
        }
        
        .copy-btn:hover {
            background: #2563eb;
        }
        
        .download-btn {
            background: #f59e0b;
            color: #000;
            margin-top: 8px;
            font-size: 14px;
            padding: 12px;
        }
        
        .download-btn:hover {
            background: #d97706;
        }
        
        .debug {
            margin-top: 20px;
            padding: 16px;
            background: #000;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #0f0;
            display: none;
            direction: ltr;
            text-align: left;
            overflow-x: auto;
        }
        
        .debug.show {
            display: block;
        }
        
        .alert {
            padding: 14px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        
        .alert.show {
            display: block;
        }
        
        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .note {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🔑 XBody License Generator</h1>
        <p class="subtitle">Medical Device License Management</p>
        
        <div class="alert alert-error" id="alertError">
            <span id="alertErrorText"></span>
        </div>
        <div class="alert alert-success" id="alertSuccess">
            <span id="alertSuccessText"></span>
        </div>
        
        <div class="form-group">
            <label>🔧 Hardware ID</label>
            <input type="text" id="hardwareId" 
                   placeholder="EE9F247004C78BE4" 
                   maxlength="16" dir="ltr"
                   oninput="this.value = this.value.toUpperCase().replace(/[^A-F0-9]/g, '')">
            <p class="note">کد ۱۶ رقمی که برنامه به کاربر نشان میدهد</p>
        </div>
        
        <div class="form-group">
            <label>📌 Version</label>
            <select id="version">
                <option value="1">Version 1</option>
                <option value="2">Version 2</option>
                <option value="3">Version 3</option>
            </select>
            <p class="note">برای غیرفعال کردن دسته‌ای لایسنس‌های قدیمی</p>
        </div>
        
        <span class="badge">♾️ لایسنس نامحدود - بدون تاریخ انقضا</span>
        
        <button onclick="generateLicense()">
            ⚡ Generate License Key
        </button>
        
        <div class="result" id="resultDiv">
            <p style="color: #10b981; margin-bottom: 12px; font-weight: 700;">
                ✅ License Key Generated
            </p>
            <div class="license-key" id="licenseKeyDisplay">XXXX-XXXX-XXXX-XX</div>
            
            <button class="copy-btn" onclick="copyKey()">
                📋 Copy to Clipboard
            </button>
            
            <button class="download-btn" onclick="downloadLicense()">
                💾 Download JSON
            </button>
        </div>
        
        <div class="debug" id="debugDiv">
            <div id="debugContent"></div>
        </div>
    </div>
    
    <script>
        // ============================================
        // 🔧 CONFIG - کلید مخفی دقیقاً مثل C++
        // ============================================
        const SECRET_KEY = "XBody_2024_SuperSecret_Key_!@#$%^&*";
        
        // ============================================
        // 🔐 SHA-256 Implementation
        // ============================================
        function sha256(message) {
            function utf8Encode(str) {
                const encoder = new TextEncoder();
                const bytes = encoder.encode(str);
                let result = '';
                for (let i = 0; i < bytes.length; i++) {
                    result += String.fromCharCode(bytes[i]);
                }
                return result;
            }
            
            function rotateRight(n, x) { return ((x >>> n) | (x << (32 - n))); }
            function choice(x, y, z) { return ((x & y) ^ (~x & z)); }
            function majority(x, y, z) { return ((x & y) ^ (x & z) ^ (y & z)); }
            function sigma0(x) { return (rotateRight(2, x) ^ rotateRight(13, x) ^ rotateRight(22, x)); }
            function sigma1(x) { return (rotateRight(6, x) ^ rotateRight(11, x) ^ rotateRight(25, x)); }
            function gamma0(x) { return (rotateRight(7, x) ^ rotateRight(18, x) ^ (x >>> 3)); }
            function gamma1(x) { return (rotateRight(17, x) ^ rotateRight(19, x) ^ (x >>> 10)); }
            
            function safeAdd(x, y) {
                const lsw = (x & 0xFFFF) + (y & 0xFFFF);
                const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
                return (msw << 16) | (lsw & 0xFFFF);
            }
            
            const K = [
                0x428A2F98,0x71374491,0xB5C0FBCF,0xE9B5DBA5,0x3956C25B,0x59F111F1,0x923F82A4,0xAB1C5ED5,
                0xD807AA98,0x12835B01,0x243185BE,0x550C7DC3,0x72BE5D74,0x80DEB1FE,0x9BDC06A7,0xC19BF174,
                0xE49B69C1,0xEFBE4786,0x0FC19DC6,0x240CA1CC,0x2DE92C6F,0x4A7484AA,0x5CB0A9DC,0x76F988DA,
                0x983E5152,0xA831C66D,0xB00327C8,0xBF597FC7,0xC6E00BF3,0xD5A79147,0x06CA6351,0x14292967,
                0x27B70A85,0x2E1B2138,0x4D2C6DFC,0x53380D13,0x650A7354,0x766A0ABB,0x81C2C92E,0x92722C85,
                0xA2BFE8A1,0xA81A664B,0xC24B8B70,0xC76C51A3,0xD192E819,0xD6990624,0xF40E3585,0x106AA070,
                0x19A4C116,0x1E376C08,0x2748774C,0x34B0BCB5,0x391C0CB3,0x4ED8AA4A,0x5B9CCA4F,0x682E6FF3,
                0x748F82EE,0x78A5636F,0x84C87814,0x8CC70208,0x90BEFFFA,0xA4506CEB,0xBEF9A3F7,0xC67178F2
            ];
            
            const H = [0x6A09E667,0xBB67AE85,0x3C6EF372,0xA54FF53A,0x510E527F,0x9B05688C,0x1F83D9AB,0x5BE0CD19];
            
            message = utf8Encode(message);
            const msgLength = message.length * 8;
            let msg = [];
            for (let i = 0; i < message.length; i++) msg.push(message.charCodeAt(i));
            
            msg.push(0x80);
            while ((msg.length * 8 + 64) % 512 !== 0) msg.push(0x00);
            for (let i = 0; i < 8; i++) msg.push((msgLength >>> (56 - i * 8)) & 0xFF);
            
            const words = [];
            for (let i = 0; i < msg.length; i += 4) {
                words.push((msg[i] << 24) | (msg[i+1] << 16) | (msg[i+2] << 8) | msg[i+3]);
            }
            
            const W = new Array(64);
            let a, b, c, d, e, f, g, h;
            
            for (let i = 0; i < words.length; i += 16) {
                for (let t = 0; t < 16; t++) W[t] = words[i + t];
                for (let t = 16; t < 64; t++) W[t] = safeAdd(safeAdd(safeAdd(gamma1(W[t-2]), W[t-7]), gamma0(W[t-15])), W[t-16]);
                
                a = H[0]; b = H[1]; c = H[2]; d = H[3]; e = H[4]; f = H[5]; g = H[6]; h = H[7];
                
                for (let t = 0; t < 64; t++) {
                    const T1 = safeAdd(safeAdd(safeAdd(safeAdd(h, sigma1(e)), choice(e, f, g)), K[t]), W[t]);
                    const T2 = safeAdd(sigma0(a), majority(a, b, c));
                    h = g; g = f; f = e; e = safeAdd(d, T1); d = c; c = b; b = a; a = safeAdd(T1, T2);
                }
                
                H[0] = safeAdd(a, H[0]); H[1] = safeAdd(b, H[1]); H[2] = safeAdd(c, H[2]); H[3] = safeAdd(d, H[3]);
                H[4] = safeAdd(e, H[4]); H[5] = safeAdd(f, H[5]); H[6] = safeAdd(g, H[6]); H[7] = safeAdd(h, H[7]);
            }
            
            let hash = '';
            for (let i = 0; i < 8; i++) hash += (H[i] >>> 0).toString(16).padStart(8, '0');
            return hash;
        }
        
        // ============================================
        // 🔑 Generate License Key
        // ============================================
        function generateLicenseKey(hardwareId, version) {
            // دقیقاً مثل C++:
            // QString data = hardwareID + secret + QString::number(version);
            const data = hardwareId + SECRET_KEY + version.toString();
            
            // QByteArray hash = QCryptographicHash::hash(data.toUtf8(), ...);
            const hash = sha256(data);
            
            // hash.toHex().left(12).toUpper();
            const core = hash.substring(0, 12).toUpperCase();
            
            // فرمت: XXXX-XXXX-XXXX-XX
            const licenseKey = core.substring(0, 4) + '-' + 
                              core.substring(4, 8) + '-' + 
                              core.substring(8, 12) + '-' + 
                              version.toString().padStart(2, '0');
            
            return {
                key: licenseKey,
                inputData: data,
                fullHash: hash.toUpperCase(),
                core: core
            };
        }
        
        // ============================================
        // 🎯 Main Function
        // ============================================
        function generateLicense() {
            const hardwareId = document.getElementById('hardwareId').value.trim().toUpperCase();
            const version = parseInt(document.getElementById('version').value);
            
            // Hide alerts
            document.getElementById('alertError').classList.remove('show');
            document.getElementById('alertSuccess').classList.remove('show');
            
            // Validation
            if (!hardwareId) {
                showError('لطفاً Hardware ID را وارد کنید');
                return;
            }
            
            if (hardwareId.length !== 16) {
                showError('Hardware ID باید دقیقاً ۱۶ کاراکتر باشد');
                return;
            }
            
            if (!/^[A-F0-9]{16}$/.test(hardwareId)) {
                showError('فقط حروف A-F و اعداد ۰-۹ مجاز است');
                return;
            }
            
            try {
                const result = generateLicenseKey(hardwareId, version);
                
                // Show result
                document.getElementById('licenseKeyDisplay').textContent = result.key;
                document.getElementById('resultDiv').classList.add('show');
                
                // Show debug info
                document.getElementById('debugContent').innerHTML = 
                    '<strong>🔍 Debug Info:</strong><br><br>' +
                    'Hardware ID: ' + hardwareId + '<br>' +
                    'Version: ' + version + '<br>' +
                    'Secret Key: ' + SECRET_KEY + '<br>' +
                    'Input String: ' + result.inputData + '<br>' +
                    'Input Length: ' + result.inputData.length + ' chars<br>' +
                    'Full SHA256: ' + result.fullHash + '<br>' +
                    'Core (12 chars): ' + result.core + '<br>' +
                    '<br><strong style="color:#0f0;">License Key: ' + result.key + '</strong>';
                document.getElementById('debugDiv').classList.add('show');
                
                showSuccess('✅ لایسنس با موفقیت تولید شد!');
                
                // Scroll to result
                document.getElementById('resultDiv').scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                showError('خطا: ' + error.message);
            }
        }
        
        // ============================================
        // 📋 Copy Function
        // ============================================
        function copyKey() {
            const key = document.getElementById('licenseKeyDisplay').textContent;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(key).then(() => {
                    showSuccess('✅ کپی شد!');
                }).catch(() => {
                    fallbackCopy(key);
                });
            } else {
                fallbackCopy(key);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showSuccess('✅ کپی شد!');
            } catch (e) {
                showError('❌ کپی نشد. لطفاً دستی کپی کنید');
            }
            document.body.removeChild(textarea);
        }
        
        // ============================================
        // 💾 Download Function
        // ============================================
        function downloadLicense() {
            const hardwareId = document.getElementById('hardwareId').value.trim().toUpperCase();
            const key = document.getElementById('licenseKeyDisplay').textContent;
            const version = document.getElementById('version').value;
            
            const data = {
                license_key: key,
                hardware_id: hardwareId,
                version: parseInt(version),
                created_at: new Date().toISOString(),
                type: 'unlimited'
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'license_' + hardwareId + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showSuccess('✅ فایل JSON دانلود شد!');
        }
        
        // ============================================
        // 🔔 Alert Functions
        // ============================================
        function showError(message) {
            const alert = document.getElementById('alertError');
            document.getElementById('alertErrorText').textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }
        
        function showSuccess(message) {
            const alert = document.getElementById('alertSuccess');
            document.getElementById('alertSuccessText').textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        // ============================================
        // 🚀 Init
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Focus on input
            document.getElementById('hardwareId').focus();
            
            // Enter key
            document.getElementById('hardwareId').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateLicense();
            });
        });
    </script>
</body>
</html>
